<!DOCTYPE html>
<html lang="en">
<head>
 <!-- Character encoding: UTF-8 supports all languages and emoji -->
 <meta charset="UTF-8">

 <!-- Responsive viewport: makes the page scale properly on mobile devices -->
 <meta name="viewport" content="width=device-width, initial-scale=1.0">

 <!-- Page title — shown in the browser tab -->
 <title>Register — Cinetale</title>

 <!-- SEO meta description -->
 <meta name="description" content="Create a Cinetale account to write reviews, build your watchlist, and discover movies.">

 <!-- Google Fonts: preconnect speeds up font loading -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

 <!-- Inter font — clean, modern, highly readable -->
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

 <!-- Our custom CSS stylesheet -->
 <link rel="stylesheet" href="/css/style.css">
</head>
<body>

 <!-- =======================================================================
 NAVIGATION BAR
 =======================================================================
 Same navbar as other pages for consistent navigation.
 ======================================================================= -->
 <nav class="navbar" id="navbar">
 <a href="/" class="logo"> Cinetale</a>
 <div class="search-container">
 <input
 type="text"
 id="searchInput"
 placeholder="Search movies or TV shows..."
 autocomplete="off"
 aria-label="Search movies or TV shows"
 >
 </div>
 <div class="nav-links">
 <a href="/" class="nav-link">Home</a>
 <a href="/watchlist.html" class="nav-link"> Watchlist</a>
      <a href="/favorites.html" class="nav-link"> Favorites</a>
 <a href="/login.html" class="nav-link" id="loginLink">Login</a>
 <a href="/profile.html" class="nav-link" id="profileLink" style="display:none;"> Profile</a>
 <button class="nav-link" id="logoutBtn" style="display:none;">Logout</button>
 </div>
 </nav>

 <!-- =======================================================================
 REGISTER FORM
 =======================================================================
 A centered glassmorphism card with the registration form.
 Users create an account by providing name, email, password, and
 confirming the password. On success, the JWT token is saved.
 ======================================================================= -->
 <div class="auth-container">
 <h2>Create Account </h2>

 <form id="registerForm">
 <!-- Name input -->
 <div class="form-group">
 <label for="registerName">Name</label>
 <input
 type="text"
 id="registerName"
 class="form-input"
 placeholder="Enter your name..."
 required
 maxlength="50"
 >
 </div>

 <!-- Email input -->
 <div class="form-group">
 <label for="registerEmail">Email</label>
 <input
 type="email"
 id="registerEmail"
 class="form-input"
 placeholder="Enter your email..."
 required
 >
 </div>

 <!-- Password input -->
 <div class="form-group">
 <label for="registerPassword">Password</label>
 <input
 type="password"
 id="registerPassword"
 class="form-input"
 placeholder="At least 6 characters..."
 required
 minlength="6"
 >
 </div>

 <!-- Confirm Password input -->
 <div class="form-group">
 <label for="registerConfirm">Confirm Password</label>
 <input
 type="password"
 id="registerConfirm"
 class="form-input"
 placeholder="Confirm your password..."
 required
 >
 </div>

 <!-- Submit button — full width via CSS -->
 <button type="submit" class="btn btn-primary">
 Create Account
 </button>
 </form>

 <!-- Link to login page for existing users -->
 <div class="auth-link">
 Already have an account? <a href="/login.html">Login</a>
 </div>
 </div>

 <!-- =======================================================================
 TOAST NOTIFICATION
 ======================================================================= -->
 <div class="toast" id="toast"></div>

 

 <!-- Shared auth utilities (loaded FIRST on every page) -->
 <script src="/js/auth.js"></script>

 <!-- =======================================================================
 REGISTER HANDLER SCRIPT
 =======================================================================
 Handles the registration form submission:
 1. Validates all fields are filled
 2. Checks password length >= 6
 3. Checks passwords match
 4. Sends a POST request to /api/auth/register
 5. On success, saves the JWT token and redirects to home
 ======================================================================= -->
 <script>
 /* ------------------------------------------------------------------
 TOAST UTILITY (same pattern as other pages)
 ------------------------------------------------------------------ */
 const toastEl = document.getElementById('toast');

 /**
 * showToast(message)
 * Displays a brief notification at the bottom-right of the screen.
 *
 * @param {string} message - The text to display
 */
 function showToast(message) {
 toastEl.textContent = message;
 toastEl.classList.add('show');
 setTimeout(() => {
 toastEl.classList.remove('show');
 }, 3000);
 }

 /* ------------------------------------------------------------------
 SEARCH REDIRECT
 ------------------------------------------------------------------ */
 const searchInput = document.getElementById('searchInput');
 searchInput.addEventListener('keydown', (event) => {
 if (event.key === 'Enter') {
 const query = searchInput.value.trim();
 if (query) {
 window.location.href = `/?search=${encodeURIComponent(query)}`;
 }
 }
 });

 /* ------------------------------------------------------------------
 REGISTER FORM SUBMISSION
 ------------------------------------------------------------------ */
 document.getElementById('registerForm').addEventListener('submit', async (e) => {
 // Prevent default form submission
 e.preventDefault();

 // Get form values
 const name = document.getElementById('registerName').value.trim();
 const email = document.getElementById('registerEmail').value.trim();
 const password = document.getElementById('registerPassword').value;
 const confirm = document.getElementById('registerConfirm').value;

 // --- Validation ---
 if (!name || !email || !password || !confirm) {
 showToast('Please fill in all fields');
 return;
 }

 if (password.length < 6) {
 showToast('Password must be at least 6 characters');
 return;
 }

 if (password !== confirm) {
 showToast('Passwords do not match');
 return;
 }

 try {
 // Send registration data to the backend
 const response = await fetch('/api/auth/register', {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({ name, email, password })
 });

 const data = await response.json();

 if (!response.ok) {
 showToast(data.message || 'Registration failed');
 return;
 }

 // Success! Save the JWT token
 setToken(data.token);
 showToast('Account created! ');

 // Redirect to home page
 setTimeout(() => {
 window.location.href = '/';
 }, 1000);

 } catch (error) {
 console.error('Registration error:', error);
 showToast('Something went wrong. Please try again.');
 }
 });
 </script>
</body>
</html>
