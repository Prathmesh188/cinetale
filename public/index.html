<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Character encoding: UTF-8 supports all languages and emoji -->
  <meta charset="UTF-8">

  <!-- Responsive viewport: makes the page scale properly on mobile devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Page title — shown in the browser tab -->
  <title>Cinetale — Discover Movies You'll Love</title>

  <!-- SEO meta description — helps search engines understand the page -->
  <meta name="description" content="Cinetale is a movie discovery platform. Find trending movies, write reviews, and build your watchlist.">

  <!-- Google Fonts: preconnect speeds up font loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Inter font — clean, modern, highly readable -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Our custom CSS stylesheet -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- =======================================================================
       NAVIGATION BAR
       =======================================================================
       Fixed to the top of the page. Contains:
       - Logo (links to home)
       - Search input (for searching movies)
       - Nav links (Home, Watchlist)
       ======================================================================= -->
  <nav class="navbar" id="navbar">
    <!-- Logo — clicking it takes you back to the home page -->
    <a href="/" class="logo">🎬 Cinetale</a>

    <!-- Search bar — users type here to search for movies -->
    <div class="search-container">
      <input
        type="text"
        id="searchInput"
        placeholder="Search movies..."
        autocomplete="off"
        aria-label="Search movies"
      >
    </div>

    <!-- Navigation links -->
    <div class="nav-links">
      <!-- "active" class highlights the current page -->
      <a href="/" class="nav-link active">Home</a>
      <a href="/watchlist.html" class="nav-link">📋 Watchlist</a>
    </div>
  </nav>

  <!-- =======================================================================
       HERO SECTION
       =======================================================================
       A large banner showing the first trending movie. The backdrop image,
       title, and overview are filled in dynamically by JavaScript.
       ======================================================================= -->
  <section class="hero" id="hero">
    <!-- This div's background-image is set by JS to the movie's backdrop -->
    <div class="hero-backdrop" id="heroBackdrop"></div>

    <!-- Text content overlaid on the backdrop -->
    <div class="hero-content">
      <h1 id="heroTitle">Loading...</h1>
      <p id="heroOverview"></p>
      <div class="hero-actions">
        <!-- This button navigates to the movie's detail page -->
        <button class="btn btn-primary" id="heroDetailsBtn">
          ✨ View Details
        </button>
      </div>
    </div>
  </section>

  <!-- =======================================================================
       SEARCH RESULTS SECTION
       =======================================================================
       Hidden by default. When the user types in the search bar, this section
       appears and the trending section hides. Results are rendered by JS.
       ======================================================================= -->
  <section class="section" id="searchResults" style="display: none;">
    <h2 class="section-title">🔍 Search Results</h2>
    <div class="movie-grid" id="searchGrid">
      <!-- Movie cards are inserted here by JavaScript -->
    </div>
  </section>

  <!-- =======================================================================
       TRENDING MOVIES SECTION
       =======================================================================
       Shows a grid of currently trending movies. Data is fetched from the
       /api/movies/trending endpoint and rendered by JavaScript.
       ======================================================================= -->
  <section class="section" id="trendingSection">
    <h2 class="section-title">🔥 Trending This Week</h2>
    <div class="movie-grid" id="trendingGrid">
      <!-- Movie cards are inserted here by JavaScript -->
    </div>
  </section>

  <!-- =======================================================================
       LOADING SPINNER
       =======================================================================
       A full-screen overlay with a spinning circle animation.
       Shown while data is being fetched, hidden when complete.
       ======================================================================= -->
  <div class="loading hidden" id="loading">
    <div class="spinner"></div>
  </div>

  <!-- =======================================================================
       TOAST NOTIFICATION
       =======================================================================
       A small popup message at the bottom-right of the screen.
       Used for feedback like "Added to watchlist" or error messages.
       ======================================================================= -->
  <div class="toast" id="toast"></div>

  <!-- =======================================================================
       FOOTER
       =======================================================================
       Simple footer with credits and TMDB attribution.
       ======================================================================= -->
  <footer class="footer">
    <p>Made with ❤️ by Cinetale | Powered by <a href="https://www.themoviedb.org/" target="_blank" rel="noopener noreferrer">TMDB</a></p>
  </footer>

  <!-- Our custom JavaScript for the home page -->
  <script src="/js/app.js"></script>
</body>
</html>
