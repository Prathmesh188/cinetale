<!DOCTYPE html>
<html lang="en">
<head>
 <!-- Character encoding -->
 <meta charset="UTF-8">

 <!-- Responsive viewport for mobile devices -->
 <meta name="viewport" content="width=device-width, initial-scale=1.0">

 <!-- Page title — will be updated by JS to show the movie name -->
 <title>Movie Details — Cinetale</title>

 <!-- Google Fonts -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

 <!-- Our CSS stylesheet -->
 <link rel="stylesheet" href="/css/style.css">
</head>
<body>

 <!-- =======================================================================
 NAVIGATION BAR
 =======================================================================
 Same navbar as the home page for consistent navigation.
 ======================================================================= -->
 <nav class="navbar" id="navbar">
 <a href="/" class="logo"> Cinetale</a>
 <div class="search-container">
 <input
 type="text"
 id="searchInput"
 placeholder="Search movies or TV shows..."
 autocomplete="off"
 aria-label="Search movies or TV shows"
 >
 </div>
 <div class="nav-links">
 <a href="/" class="nav-link">Home</a>
 <a href="/watchlist.html" class="nav-link"> Watchlist</a>
      <a href="/favorites.html" class="nav-link"> Favorites</a>
 <a href="/login.html" class="nav-link" id="loginLink">Login</a>
 <a href="/profile.html" class="nav-link" id="profileLink" style="display:none;"> Profile</a>
 <button class="nav-link" id="logoutBtn" style="display:none;">Logout</button>
 </div>
 </nav>

 <!-- =======================================================================
 MOVIE HEADER
 =======================================================================
 Full-width backdrop with gradient overlay. Contains the movie poster
 on the left and detailed info on the right.
 ======================================================================= -->
 <section class="movie-header" id="movieHeader">
 <!-- Backdrop image — set dynamically by JavaScript -->
 <div class="movie-backdrop" id="movieBackdrop"></div>

 <!-- Poster + Info side by side -->
 <div class="movie-detail">
 <!-- Left side: Movie poster -->
 <div class="movie-poster" id="moviePoster">
 <!-- Poster image inserted by JS -->
 </div>

 <!-- Right side: Movie information -->
 <div class="movie-info">
 <!-- Movie title -->
 <h1 id="movieTitle">Loading...</h1>

 <!-- Meta info: year, runtime, rating -->
 <div class="movie-meta" id="movieMeta">
 <!-- Filled by JavaScript -->
 </div>

 <!-- Genre pill badges -->
 <div class="genres" id="movieGenres">
 <!-- Filled by JavaScript -->
 </div>

 <!-- Movie overview/description -->
 <p class="movie-overview" id="movieOverview"></p>

 <!-- Action buttons -->
 <div class="movie-actions">
 <!-- Watchlist toggle button -->
 <button class="btn btn-secondary btn-watchlist" id="watchlistBtn">
 Add to Watchlist
 </button>
 <button class="btn btn-secondary btn-favorite" id="favoriteBtn">
 ️ Favorite
 </button>
 </div>
 </div>
 </div>
 </section>

 <section class="meter-section">
 <div class="community-meter" id="communityMeter">
 <h3> Community Rating</h3>

 <!-- Average rating display -->
 <div class="star-rating-display" id="starRatingDisplay">
 <div class="star-rating-big" id="avgStars">☆☆☆☆☆</div>
 <div class="star-rating-number" id="avgRatingValue">0.0</div>
 </div>

 <!-- Vote count -->
 <div class="community-verdict" id="communityVerdict">
 <p class="verdict-value" id="verdictValue">No ratings yet</p>
 </div>
 </div>
 </section>

 <!-- =======================================================================
 REVIEW FORM
 =======================================================================
 A form where users can submit their own review and Cinetale Meter
 rating for the movie.
 ======================================================================= -->
 <section class="reviews-section">
 <div class="review-form-container">
 <h3>️ Write a Review</h3>

 <form id="reviewForm">
 <!-- Auth message (shown when not logged in) -->
 <div id="authMessage" class="auth-message" style="display:none;">
 <p>Please <a href="/login.html">log in</a> to write a review</p>
 </div>

 <!-- Review fields (hidden when not logged in) -->
 <div id="reviewFields">

 <!-- Star rating picker (1-5) -->
 <div class="form-group">
 <label>Your Rating</label>
 <div class="star-picker" id="starPicker">
 <!-- Each star is a radio button styled as a clickable star -->
 <input type="radio" name="rating" id="rate1" value="1">
 <label for="rate1" class="star-label" title="1 star">★</label>

 <input type="radio" name="rating" id="rate2" value="2">
 <label for="rate2" class="star-label" title="2 stars">★</label>

 <input type="radio" name="rating" id="rate3" value="3">
 <label for="rate3" class="star-label" title="3 stars">★</label>

 <input type="radio" name="rating" id="rate4" value="4">
 <label for="rate4" class="star-label" title="4 stars">★</label>

 <input type="radio" name="rating" id="rate5" value="5">
 <label for="rate5" class="star-label" title="5 stars">★</label>
 </div>
 </div>

 <!-- Review content textarea -->
 <div class="form-group">
 <label for="reviewContent">Your Review</label>
 <textarea
 id="reviewContent"
 class="form-textarea"
 placeholder="Share your thoughts about this movie or TV show..."
 required
 maxlength="1000"
 ></textarea>
 </div>

 <!-- Submit button -->
 <button type="submit" class="btn btn-primary">
 Submit Review
 </button>
 </div> <!-- end #reviewFields -->
 </form>
 </div>

 <!-- =======================================================================
 REVIEWS LIST
 =======================================================================
 Existing reviews for this movie are listed here. Each review is a
 glassmorphism card with author, rating badge, content, and date.
 ======================================================================= -->
 <h3 class="section-title" style="margin-top: 2rem;"> Reviews</h3>
 <div id="reviewsList">
 <!-- Review cards are inserted here by JavaScript -->
 </div>
 </section>

 <!-- =======================================================================
 CAST SECTION
 =======================================================================
 A horizontally scrollable row of cast member cards showing photos,
 names, and character names.
 ======================================================================= -->
 <section class="cast-section" id="castSection">
 <h3> Cast</h3>
 <div class="cast-grid" id="castGrid">
 <!-- Cast cards are inserted here by JavaScript -->
 </div>
 </section>

 <!-- =======================================================================
 LOADING SPINNER
 ======================================================================= -->
 <div class="loading hidden" id="loading">
 <div class="spinner"></div>
 </div>

 <!-- =======================================================================
 TOAST NOTIFICATION
 ======================================================================= -->
 <div class="toast" id="toast"></div>

 

 <!-- Shared auth utilities -->
 <script src="/js/auth.js"></script>
 <!-- Movie detail page JavaScript -->
 <script src="/js/movie.js"></script>
</body>
</html>
