<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Character encoding -->
  <meta charset="UTF-8">

  <!-- Responsive viewport for mobile devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Page title — will be updated by JS to show the movie name -->
  <title>Movie Details — Cinetale</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Our CSS stylesheet -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- =======================================================================
       NAVIGATION BAR
       =======================================================================
       Same navbar as the home page for consistent navigation.
       ======================================================================= -->
  <nav class="navbar" id="navbar">
    <a href="/" class="logo">🎬 Cinetale</a>
    <div class="search-container">
      <input
        type="text"
        id="searchInput"
        placeholder="Search movies..."
        autocomplete="off"
        aria-label="Search movies"
      >
    </div>
    <div class="nav-links">
      <a href="/" class="nav-link">Home</a>
      <a href="/watchlist.html" class="nav-link">📋 Watchlist</a>
    </div>
  </nav>

  <!-- =======================================================================
       MOVIE HEADER
       =======================================================================
       Full-width backdrop with gradient overlay. Contains the movie poster
       on the left and detailed info on the right.
       ======================================================================= -->
  <section class="movie-header" id="movieHeader">
    <!-- Backdrop image — set dynamically by JavaScript -->
    <div class="movie-backdrop" id="movieBackdrop"></div>

    <!-- Poster + Info side by side -->
    <div class="movie-detail">
      <!-- Left side: Movie poster -->
      <div class="movie-poster" id="moviePoster">
        <!-- Poster image inserted by JS -->
      </div>

      <!-- Right side: Movie information -->
      <div class="movie-info">
        <!-- Movie title -->
        <h1 id="movieTitle">Loading...</h1>

        <!-- Meta info: year, runtime, rating -->
        <div class="movie-meta" id="movieMeta">
          <!-- Filled by JavaScript -->
        </div>

        <!-- Genre pill badges -->
        <div class="genres" id="movieGenres">
          <!-- Filled by JavaScript -->
        </div>

        <!-- Movie overview/description -->
        <p class="movie-overview" id="movieOverview"></p>

        <!-- Action buttons -->
        <div class="movie-actions">
          <!-- Watchlist toggle button -->
          <button class="btn btn-secondary btn-watchlist" id="watchlistBtn">
            📋 Add to Watchlist
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- =======================================================================
       CINETALE METER — Community Rating
       =======================================================================
       Shows the aggregate community rating based on all user reviews.
       Displays counts for each of the 4 rating tiers.
       ======================================================================= -->
  <section class="meter-section">
    <div class="community-meter" id="communityMeter">
      <h3>🎯 Cinetale Meter</h3>

      <!-- Four rating tiers displayed as visual options -->
      <div class="meter-options" id="meterDisplay">
        <!-- Skip tier -->
        <div class="meter-option skip">
          <div>
            <label>
              <span class="meter-icon">💀</span>
              <span class="meter-label">Skip</span>
              <span class="meter-count" id="skipCount">0 votes</span>
            </label>
          </div>
        </div>

        <!-- Time Pass tier -->
        <div class="meter-option timepass">
          <div>
            <label>
              <span class="meter-icon">🍿</span>
              <span class="meter-label">Time Pass</span>
              <span class="meter-count" id="timepassCount">0 votes</span>
            </label>
          </div>
        </div>

        <!-- Go For It tier -->
        <div class="meter-option goforit">
          <div>
            <label>
              <span class="meter-icon">🎬</span>
              <span class="meter-label">Go For It</span>
              <span class="meter-count" id="goforitCount">0 votes</span>
            </label>
          </div>
        </div>

        <!-- Perfection tier -->
        <div class="meter-option perfection">
          <div>
            <label>
              <span class="meter-icon">👑</span>
              <span class="meter-label">Perfection</span>
              <span class="meter-count" id="perfectionCount">0 votes</span>
            </label>
          </div>
        </div>
      </div>

      <!-- The overall community verdict -->
      <div class="community-verdict" id="communityVerdict">
        <p class="verdict-label">Community Verdict</p>
        <p class="verdict-value" id="verdictValue">No ratings yet</p>
      </div>
    </div>
  </section>

  <!-- =======================================================================
       REVIEW FORM
       =======================================================================
       A form where users can submit their own review and Cinetale Meter
       rating for the movie.
       ======================================================================= -->
  <section class="reviews-section">
    <div class="review-form-container">
      <h3>✍️ Write a Review</h3>

      <form id="reviewForm">
        <!-- Author name input -->
        <div class="form-group">
          <label for="reviewAuthor">Your Name</label>
          <input
            type="text"
            id="reviewAuthor"
            class="form-input"
            placeholder="Enter your name..."
            required
            maxlength="50"
          >
        </div>

        <!-- Cinetale Meter rating picker -->
        <div class="form-group">
          <label>Your Rating</label>
          <div class="meter-options">
            <!-- Each option is a styled radio button -->
            <!-- "name" groups them so only one can be selected -->

            <div class="meter-option skip">
              <input type="radio" name="rating" id="rateSkip" value="Skip">
              <label for="rateSkip">
                <span class="meter-icon">💀</span>
                <span class="meter-label">Skip</span>
              </label>
            </div>

            <div class="meter-option timepass">
              <input type="radio" name="rating" id="rateTimePass" value="Time Pass">
              <label for="rateTimePass">
                <span class="meter-icon">🍿</span>
                <span class="meter-label">Time Pass</span>
              </label>
            </div>

            <div class="meter-option goforit">
              <input type="radio" name="rating" id="rateGoForIt" value="Go For It">
              <label for="rateGoForIt">
                <span class="meter-icon">🎬</span>
                <span class="meter-label">Go For It</span>
              </label>
            </div>

            <div class="meter-option perfection">
              <input type="radio" name="rating" id="ratePerfection" value="Perfection">
              <label for="ratePerfection">
                <span class="meter-icon">👑</span>
                <span class="meter-label">Perfection</span>
              </label>
            </div>
          </div>
        </div>

        <!-- Review content textarea -->
        <div class="form-group">
          <label for="reviewContent">Your Review</label>
          <textarea
            id="reviewContent"
            class="form-textarea"
            placeholder="Share your thoughts about this movie..."
            required
            maxlength="1000"
          ></textarea>
        </div>

        <!-- Submit button -->
        <button type="submit" class="btn btn-primary">
          🚀 Submit Review
        </button>
      </form>
    </div>

    <!-- =======================================================================
         REVIEWS LIST
         =======================================================================
         Existing reviews for this movie are listed here. Each review is a
         glassmorphism card with author, rating badge, content, and date.
         ======================================================================= -->
    <h3 class="section-title" style="margin-top: 2rem;">💬 Reviews</h3>
    <div id="reviewsList">
      <!-- Review cards are inserted here by JavaScript -->
    </div>
  </section>

  <!-- =======================================================================
       CAST SECTION
       =======================================================================
       A horizontally scrollable row of cast member cards showing photos,
       names, and character names.
       ======================================================================= -->
  <section class="cast-section" id="castSection">
    <h3>🎭 Cast</h3>
    <div class="cast-grid" id="castGrid">
      <!-- Cast cards are inserted here by JavaScript -->
    </div>
  </section>

  <!-- =======================================================================
       LOADING SPINNER
       ======================================================================= -->
  <div class="loading hidden" id="loading">
    <div class="spinner"></div>
  </div>

  <!-- =======================================================================
       TOAST NOTIFICATION
       ======================================================================= -->
  <div class="toast" id="toast"></div>

  <!-- =======================================================================
       FOOTER
       ======================================================================= -->
  <footer class="footer">
    <p>Made with ❤️ by Cinetale | Powered by <a href="https://www.themoviedb.org/" target="_blank" rel="noopener noreferrer">TMDB</a></p>
  </footer>

  <!-- Movie detail page JavaScript -->
  <script src="/js/movie.js"></script>
</body>
</html>
